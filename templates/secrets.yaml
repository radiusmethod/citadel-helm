{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "citadel.secretName" . }}
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.postgresql.enabled }}
  DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username (.Values.postgresql.auth.password | default "") .Release.Name .Values.postgresql.auth.database }}
  {{- else if .Values.externalDatabase.url }}
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  {{- end }}
  SECRET_KEY: {{ .Values.citadel.secretKey | quote }}
  {{- if .Values.citadel.okta.enabled }}
  OKTA_CLIENT_SECRET: {{ .Values.citadel.okta.clientSecret | quote }}
  UI_SESSION_SECRET: {{ .Values.citadel.okta.sessionSecret | quote }}
  {{- end }}
  {{- if .Values.providers.openrouter.apiKey }}
  OPENROUTER_API_KEY: {{ .Values.providers.openrouter.apiKey | quote }}
  {{- end }}
  {{- if .Values.providers.anthropic.apiKey }}
  ANTHROPIC_API_KEY: {{ .Values.providers.anthropic.apiKey | quote }}
  {{- end }}
  {{- if .Values.providers.vertexai.credentialsJson }}
  GOOGLE_APPLICATION_CREDENTIALS_JSON: {{ .Values.providers.vertexai.credentialsJson | quote }}
  {{- end }}
  {{- if .Values.providers.bedrock.accessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.providers.bedrock.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.providers.bedrock.secretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.providers.bedrock.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.externalRedis.url }}
  REDIS_URL: {{ .Values.externalRedis.url | quote }}
  {{- end }}
{{- end }}
