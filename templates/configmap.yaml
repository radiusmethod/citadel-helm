apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-models
  labels:
    {{- include "citadel.labels" . | nindent 4 }}
data:
  models.yaml: |
    # Citadel Model Configuration
    #
    # Compliance Labels:
    #   [CUI-APPROVED] - FedRAMP-compliant models hosted on AWS Bedrock GovCloud
    #   [EXTERNAL]     - External API models (OpenRouter, Vertex AI) - NOT approved for CUI
    #
    # Provider Types:
    #   bedrock     - AWS Bedrock (GovCloud)
    #   openrouter  - OpenRouter (200+ models)
    #   vertex_ai   - Google Vertex AI

    settings:
      model_curation_enabled: true
      fallback_to_dynamic: false

    model_list:
      # ==========================================================================
      # CUI-APPROVED (AWS GovCloud Bedrock)
      # ==========================================================================

      - model_name: bedrock-claude-3-7-sonnet [CUI-APPROVED]
        provider: bedrock
        provider_params:
          model: anthropic.claude-3-7-sonnet-20250219-v1:0
          aws_region: us-gov-west-1
          max_tokens: 8000

      - model_name: bedrock-claude-3-haiku [CUI-APPROVED]
        provider: bedrock
        provider_params:
          model: anthropic.claude-3-haiku-20240307-v1:0
          aws_region: us-gov-west-1
          max_tokens: 4096

      # ==========================================================================
      # EXTERNAL (OpenRouter)
      # ==========================================================================

      - model_name: or-claude-opus-4.5 [EXTERNAL]
        provider: openrouter
        provider_params:
          model: anthropic/claude-opus-4.5

      - model_name: or-claude-sonnet-4.5 [EXTERNAL]
        provider: openrouter
        provider_params:
          model: anthropic/claude-sonnet-4.5

      - model_name: or-claude-haiku-4.5 [EXTERNAL]
        provider: openrouter
        provider_params:
          model: anthropic/claude-haiku-4.5

      - model_name: or-grok-4.1-fast [EXTERNAL]
        provider: openrouter
        provider_params:
          model: x-ai/grok-4.1-fast

      - model_name: or-grok-code-fast-1 [EXTERNAL]
        provider: openrouter
        provider_params:
          model: x-ai/grok-code-fast-1

      - model_name: or-gpt-5.1 [EXTERNAL]
        provider: openrouter
        provider_params:
          model: openai/gpt-5.1

      - model_name: or-gpt-5.1-chat [EXTERNAL]
        provider: openrouter
        provider_params:
          model: openai/gpt-5.1-chat

      - model_name: or-gpt-5-image [EXTERNAL]
        provider: openrouter
        provider_params:
          model: openai/gpt-5-image

      - model_name: or-gpt-5-image-mini [EXTERNAL]
        provider: openrouter
        provider_params:
          model: openai/gpt-5-image-mini

      # ==========================================================================
      # CUI-APPROVED (Google Vertex AI)
      # ==========================================================================

      - model_name: gemini-3-flash-preview [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-3-flash-preview

      - model_name: gemini-3-pro-preview [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-3-pro-preview

      - model_name: gemini-3-pro-image-preview [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-3-pro-image-preview

      - model_name: gemini-2.5-pro [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.5-pro

      - model_name: gemini-2.5-flash [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.5-flash

      - model_name: gemini-2.5-flash-lite [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.5-flash-lite

      - model_name: gemini-2.5-flash-image [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.5-flash-image

      - model_name: gemini-2.0-flash [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.0-flash-001

      - model_name: gemini-2.0-flash-lite [CUI-APPROVED]
        provider: vertex_ai
        provider_params:
          model: gemini-2.0-flash-lite-001
