name: Lint Chart

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Build dependencies
        run: helm dependency build .

      - name: Helm lint
        run: helm lint . --set citadel.secretKey=test

      - name: Helm template
        run: helm template citadel . --set citadel.secretKey=test

      - name: Render templates for kubelinter
        run: helm template citadel . --set citadel.secretKey=test --output-dir rendered

      - name: Install kubelinter
        run: |
          curl -sSLO "https://github.com/stackrox/kube-linter/releases/latest/download/kube-linter-linux"
          chmod +x kube-linter-linux
          sudo mv kube-linter-linux /usr/local/bin/kube-linter

      - name: Run kubelinter
        run: kube-linter lint rendered/
